<!doctype html>
<html>
<head>
  <title>Sanctum Send</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 12px;
    }
    h3 {
      font-size: 14px;
      color: #7c83ff;
      margin-bottom: 10px;
    }
    .section-label {
      font-size: 10px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    .bot-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 8px;
    }
    .bot-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      color: #e0e0e0;
      font-size: 13px;
      transition: background 0.15s;
    }
    .bot-btn:hover {
      background: #1a1a4e;
      border-color: #7c83ff;
    }
    .bot-btn .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }
    .bot-btn .name {
      flex-grow: 1;
      font-weight: 500;
    }
    .bot-btn .arrow {
      color: #555;
      font-size: 11px;
    }
    .quick-actions {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .quick-btn {
      flex: 1;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 6px;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .quick-btn:hover {
      background: #1a1a4e;
      color: #7c83ff;
      border-color: #7c83ff;
    }
    .quick-btn .icon { font-size: 16px; display: block; margin-bottom: 2px; }
    .no-bots {
      text-align: center;
      color: #666;
      font-size: 12px;
      padding: 16px 0;
    }
    .no-bots a {
      color: #7c83ff;
      text-decoration: none;
    }
    .footer {
      margin-top: 10px;
      text-align: center;
    }
    .footer a {
      color: #555;
      font-size: 10px;
      text-decoration: none;
    }
    .footer a:hover { color: #7c83ff; }
    #status {
      text-align: center;
      font-size: 11px;
      margin-top: 8px;
      min-height: 16px;
    }
    #status.ok { color: #4ade80; }
    #status.err { color: #f87171; }
    #file-input { display: none; }
    select {
      width: 100%;
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e0e0e0;
      padding: 6px;
      font-size: 12px;
      margin-bottom: 8px;
    }
    select:focus { border-color: #7c83ff; outline: none; }
  </style>
</head>
<body>
  <h3>Sanctum Send</h3>

  <div class="section-label">Send to</div>
  <select id="bot-select"></select>

  <div class="section-label">Quick actions</div>
  <div class="quick-actions">
    <div class="quick-btn" id="send-page"><span class="icon">&#x1f4c4;</span>Page</div>
    <div class="quick-btn" id="send-selection"><span class="icon">&#x270f;</span>Selection</div>
    <div class="quick-btn" id="send-screenshot"><span class="icon">&#x1f4f7;</span>Screenshot</div>
    <div class="quick-btn" id="send-file"><span class="icon">&#x1f4ce;</span>Upload</div>
  </div>

  <input type="file" id="file-input" multiple>

  <div id="status"></div>
  <div class="footer"><a href="#" id="settings">Settings</a></div>
  <script src="popup.js"></script>
</body>
</html>
