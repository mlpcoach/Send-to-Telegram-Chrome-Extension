<!doctype html>
<html>
<head>
  <title>Sanctum Send</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 12px;
    }
    h3 {
      font-size: 14px;
      color: #7c83ff;
      margin-bottom: 10px;
    }
    .bot-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }
    .bot-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
      color: #e0e0e0;
      font-size: 13px;
      transition: background 0.15s;
    }
    .bot-btn:hover {
      background: #1a1a4e;
      border-color: #7c83ff;
    }
    .bot-btn .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
    }
    .bot-btn .name {
      flex-grow: 1;
      font-weight: 500;
    }
    .bot-btn .arrow {
      color: #555;
      font-size: 11px;
    }
    .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .action-btn {
      flex: 1;
      min-width: 60px;
      background: #16213e;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }
    .action-btn:hover {
      background: #1a1a4e;
      color: #7c83ff;
      border-color: #7c83ff;
    }
    .action-btn.active {
      background: #7c83ff;
      color: white;
      border-color: #7c83ff;
    }
    .no-bots {
      text-align: center;
      color: #666;
      font-size: 12px;
      padding: 16px 0;
    }
    .no-bots a {
      color: #7c83ff;
      text-decoration: none;
    }
    .footer {
      margin-top: 10px;
      text-align: center;
    }
    .footer a {
      color: #555;
      font-size: 10px;
      text-decoration: none;
    }
    .footer a:hover { color: #7c83ff; }
    #status {
      text-align: center;
      font-size: 11px;
      margin-top: 8px;
      min-height: 16px;
    }
    #status.ok { color: #4ade80; }
    #status.err { color: #f87171; }
  </style>
</head>
<body>
  <h3>Sanctum Send</h3>
  <div id="bot-list" class="bot-list"></div>
  <div id="status"></div>
  <div class="footer"><a href="#" id="settings">Settings</a></div>
  <script src="popup.js"></script>
</body>
</html>
