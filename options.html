<!doctype html>
<html>
<head>
  <title>Sanctum Send — Settings</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 24px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { color: #7c83ff; font-size: 22px; margin-bottom: 4px; }
    .subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }
    .bot-card {
      background: #16213e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .bot-card .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .bot-card .header .name { font-weight: 600; font-size: 15px; }
    .bot-card .remove-btn {
      background: none;
      border: 1px solid #555;
      border-radius: 4px;
      color: #f87171;
      cursor: pointer;
      padding: 3px 8px;
      font-size: 11px;
    }
    .bot-card .remove-btn:hover { border-color: #f87171; }
    .field {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }
    .field label {
      width: 80px;
      text-align: right;
      font-size: 12px;
      color: #888;
      flex-shrink: 0;
    }
    .field input {
      flex: 1;
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 8px;
      color: #e0e0e0;
      font-size: 13px;
      font-family: monospace;
    }
    .field input:focus { border-color: #7c83ff; outline: none; }
    .field input.invalid { border-color: #f87171; }
    .field input.valid { border-color: #4ade80; }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    button {
      background: #7c83ff;
      border: none;
      border-radius: 6px;
      color: white;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    button:hover { background: #6b72e8; }
    button.secondary {
      background: #16213e;
      border: 1px solid #333;
      color: #aaa;
    }
    button.secondary:hover { border-color: #7c83ff; color: #7c83ff; }
    #status {
      margin-top: 12px;
      font-size: 13px;
      min-height: 20px;
    }
    #status.ok { color: #4ade80; }
    #status.err { color: #f87171; }
    .empty {
      text-align: center;
      color: #555;
      padding: 30px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>Sanctum Send</h1>
  <div class="subtitle">Multi-bot Telegram sender for the NeuroSanctum fleet</div>

  <div id="bot-list"></div>

  <div class="btn-row">
    <button id="add-bot">+ Add Bot</button>
    <button id="save" class="secondary">Save All</button>
  </div>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
